<!DOCTYPE html>
<html>
<body>
    <h2 id="estado">Jugador en casilla: 0</h2>
    <div id="tablero" style="display:grid; grid-template-columns: repeat(13, 30px); gap: 2px;"></div>
    <button onclick="moverFicha()">Lanzar Dado</button>

    <script>
        let posicion = 0;
        const tablero = document.getElementById('tablero');

        // Dibujar casillas
        for(let i=0; i<52; i++) {
            let div = document.createElement('div');
            div.style.border = "1px solid black";
            div.style.height = "30px";
            div.id = "c-" + i;
            tablero.appendChild(div);
        }

        function moverFicha() {
            let dado = Math.floor(Math.random() * 6) + 1;
            posicion = (posicion + dado) % 52;
            document.getElementById('estado').innerText = "Casilla: " + posicion;
            
            // Limpiar tablero y poner ficha en nueva posición
            document.querySelectorAll('div').forEach(d => d.innerText = "");
            document.getElementById('c-' + posicion).innerText = "🔴";
        }
    </script>
</body>
</html>
