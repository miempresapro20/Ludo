<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapeador Ludo Family</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        
        #contenedor-tablero {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            cursor: crosshair;
        }

        #tablero-img {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ficha {
            position: absolute;
            font-size: 30px;
            transition: all 0.3s;
            top: 5%; 
            left: 5%;
        }

        #panel-datos { margin-top: 20px; width: 100%; max-width: 500px; }
        textarea { width: 100%; height: 100px; }
    </style>
</head>
<body>

    <h1>Ludo Family: Mapeador</h1>
    <p>Haz clic en el tablero para obtener las coordenadas</p>
    
    <div id="contenedor-tablero">
        <img id="tablero-img" src="imagen/tablero_limpio.png" alt="Tablero">
        <div id="ficha">🔴</div>
    </div>

    <div id="panel-datos">
        <p>Coordenadas obtenidas:</p>
        <textarea id="listaCoordenadas" readonly></textarea>
        <button onclick="limpiar()" style="margin-top:10px;">Limpiar</button>
    </div>

    <script>
        const lista = document.getElementById('listaCoordenadas');

        document.getElementById('contenedor-tablero').addEventListener('click', (e) => {
            let rect = e.target.getBoundingClientRect();
            // Si clicaste en la imagen o en el contenedor, calculamos relativo al contenedor
            let x = ((e.clientX - rect.left) / rect.width) * 100;
            let y = ((e.clientY - rect.top) / rect.height) * 100;
            
            let coord = `[${y.toFixed(1)}, ${x.toFixed(1)}], `;
            lista.value += coord;
            
            // Mover la ficha visualmente para confirmar
            let ficha = document.getElementById('ficha');
            ficha.style.top = (y - 2) + "%";
            ficha.style.left = (x - 2) + "%";
        });

        function limpiar() { lista.value = ""; }
    </script>
</body>
</html>
