<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapeo Ludo Family</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; padding: 20px; }
        
        #contenedor-tablero {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            cursor: crosshair; /* Indica que se puede hacer clic */
        }

        #tablero-img {
            width: 100%;
            height: 100%;
            display: block;
        }

        #panel-mapeo { 
            margin-top: 20px; 
            width: 100%; 
            max-width: 600px; 
            background: #34495e; 
            padding: 15px; 
            border-radius: 8px; 
        }

        textarea { 
            width: 100%; 
            height: 100px; 
            margin-top: 10px; 
            box-sizing: border-box; 
        }
    </style>
</head>
<body>

    <h1>Administrador: Mapeo de Casillas</h1>
    <p>Haz clic en cada casilla en el orden correcto (0 al 51)</p>

    <div id="contenedor-tablero">
        <img id="tablero-img" src="imagen/tablero_limpio.png" alt="Tablero">
    </div>

    <div id="panel-mapeo">
        <p>Lista de coordenadas (copia esto cuando termines):</p>
        <textarea id="listaCoordenadas" readonly></textarea>
        <button onclick="limpiarLista()" style="margin-top:10px; padding: 5px 15px;">Limpiar lista</button>
    </div>

    <script>
        const lista = document.getElementById('listaCoordenadas');

        document.getElementById('tablero-img').addEventListener('click', (e) => {
            // Calculamos el porcentaje exacto de donde hiciste clic
            let rect = e.target.getBoundingClientRect();
            let x = ((e.clientX - rect.left) / rect.width) * 100;
            let y = ((e.clientY - rect.top) / rect.height) * 100;
            
            // Agregamos al textarea con formato de array
            let nuevaCoord = `[${y.toFixed(1)}, ${x.toFixed(1)}], `;
            lista.value += nuevaCoord;
        });

        function limpiarLista() {
            lista.value = "";
        }
    </script>
</body>
</html>
