<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Family</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="vista-login" class="pantalla">
        <h1>Ludo Family</h1>
        <input type="text" id="input-alias" placeholder="Ingresa tu Apodo">
        <button onclick="guardarUsuario()">Entrar</button>
    </div>

    <div id="vista-menu" class="pantalla" style="display:none;">
        <h2>¿Cómo quieres jugar?</h2>
        <button onclick="seleccionarModo('online')">Online</button>
        <button onclick="seleccionarModo('local')">Local</button>
    </div>

    <div id="vista-jugadores" class="pantalla" style="display:none;">
        <h2>¿Cuántos jugadores?</h2>
        <button onclick="irASalas(2)">2 Jugadores</button>
        <button onclick="irASalas(4)">4 Jugadores</button>
    </div>

    <div id="vista-salas" class="pantalla" style="display:none;">
        <h2>Salas Disponibles</h2>
        <button onclick="crearSala()">Crear Sala Propia</button>
        <div id="lista-salas"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
