<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapeador Ludo Family</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        
        #contenedor-tablero {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            cursor: crosshair;
        }

        #tablero-img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Clase para las fichas fijas */
        .ficha-juego {
            position: absolute;
            width: 6%;
            height: 6%;
            z-index: 10;
        }

        /* Punto rojo para marcar mapeo */
        #ficha-marcador {
            position: absolute;
            font-size: 30px;
            z-index: 20;
            pointer-events: none; /* Para que no interfiera con los clics */
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <h1>Ludo Family: Mapeador</h1>
    <p>Haz clic en el tablero para obtener las coordenadas</p>
    
    <div id="contenedor-tablero">
        <img id="tablero-img" src="imagen/tablero_limpio.png" alt="Tablero">
        
        <div id="ficha-marcador">🔴</div>

        <img src="imagen/verde_1.png" class="ficha-juego" style="top: 19.8%; left: 19.8%;">
        <img src="imagen/verde_2.png" class="ficha-juego" style="top: 19.8%; left: 31.8%;">
        <img src="imagen/verde_3.png" class="ficha-juego" style="top: 31.8%; left: 19.8%;">
        <img src="imagen/verde_4.png" class="ficha-juego" style="top: 31.8%; left: 31.8%;">

        <img src="imagen/amarilla_1.png" class="ficha-juego" style="top: 19.8%; left: 62.4%;">
        <img src="imagen/amarilla_2.png" class="ficha-juego" style="top: 19.8%; left: 74.4%;">
        <img src="imagen/amarilla_3.png" class="ficha-juego" style="top: 31.8%; left: 62.4%;">
        <img src="imagen/amarilla_4.png" class="ficha-juego" style="top: 31.8%; left: 74.4%;">

        <img src="imagen/roja_1.png" class="ficha-juego" style="top: 62.4%; left: 19.8%;">
        <img src="imagen/roja_2.png" class="ficha-juego" style="top: 62.4%; left: 31.8%;">
        <img src="imagen/roja_3.png" class="ficha-juego" style="top: 74.4%; left: 19.8%;">
        <img src="imagen/roja_4.png" class="ficha-juego" style="top: 74.4%; left: 31.8%;">

        <img src="imagen/azul_1.png" class="ficha-juego" style="top: 62.4%; left: 62.4%;">
        <img src="imagen/azul_2.png" class="ficha-juego" style="top: 62.4%; left: 74.4%;">
        <img src="imagen/azul_3.png" class="ficha-juego" style="top: 74.4%; left: 62.4%;">
        <img src="imagen/azul_4.png" class="ficha-juego" style="top: 74.4%; left: 74.4%;">
    </div>

    <div id="panel-datos">
        <p>Coordenadas obtenidas:</p>
        <textarea id="listaCoordenadas" readonly></textarea>
        <button onclick="limpiar()" style="margin-top:10px;">Limpiar</button>
    </div>

    <script>
        const lista = document.getElementById('listaCoordenadas');
        const marcador = document.getElementById('ficha-marcador');

        document.getElementById('contenedor-tablero').addEventListener('click', (e) => {
            let rect = e.target.getBoundingClientRect();
            let x = ((e.clientX - rect.left) / rect.width) * 100;
            let y = ((e.clientY - rect.top) / rect.height) * 100;
            
            let coord = `[${y.toFixed(1)}, ${x.toFixed(1)}], `;
            lista.value += coord;

            // Mover el punto rojo
            marcador.style.top = y + "%";
            marcador.style.left = x + "%";
        });

        function limpiar() { 
            lista.value = ""; 
            marcador.style.top = "-10%"; // Ocultar punto
        }
    </script>
</body>
</html>
