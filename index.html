<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ludo Family: Movimiento de Fichas</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        #contenedor-tablero { position: relative; width: 90vmin; height: 90vmin; }
        #tablero-img { width: 100%; height: 100%; display: block; }
        .ficha {
            position: absolute; width: 5%; height: 5%;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%); z-index: 10;
            cursor: pointer; transition: all 0.3s ease;
        }
        #area-juego { margin-top: 20px; text-align: center; }
        #dado-img { width: 80px; height: 80px; margin: 10px; display: none; }
    </style>
</head>
<body>

    <h1>Ludo Family</h1>
    <div id="contenedor-tablero">
        <img id="tablero-img" src="imagen/tablero_limpio.png" alt="Tablero">
    </div>

    <div id="area-juego">
        <div id="indicador-turno">Turno: Verde</div>
        <img id="dado-img" src="" alt="Dado">
        <br>
        <button onclick="lanzarDado()" style="padding: 10px 20px; cursor: pointer;">Lanzar Dado</button>
    </div>

    <script>
        let turno = 0;
        let valorDado = 0;
        const colores = ['Verde', 'Amarillo', 'Azul', 'Rojo'];
        const arraysCoordenadas = { 'Verde': verdes, 'Amarillo': amarillos, 'Azul': azules, 'Rojo': rojos };
        
        // Estado: índice de la posición de cada ficha (-1 significa en base)
        let posicionesFichas = {
            'Verde': [-1, -1, -1, -1],
            'Amarillo': [-1, -1, -1, -1],
            'Azul': [-1, -1, -1, -1],
            'Rojo': [-1, -1, -1, -1]
        };

        function crearFichasBase(color) {
            const contenedor = document.getElementById('contenedor-tablero');
            for(let i = 0; i < 4; i++) {
                const ficha = document.createElement('div');
                ficha.className = 'ficha';
                ficha.style.backgroundColor = color;
                // Posición inicial en base (primeros 4 del array)
                const coord = arraysCoordenadas[color][i];
                ficha.style.top = coord[0] + "%";
                ficha.style.left = coord[1] + "%";
                ficha.id = `${color}-${i}`;
                ficha.onclick = () => moverFicha(color, i);
                contenedor.appendChild(ficha);
            }
        }

        function moverFicha(color, index) {
            if (valorDado === 0) return; // No se puede mover sin lanzar

            let posActual = posicionesFichas[color][index];
            
            // Lógica: Si está en base (-1) y sale 6, entra al tablero (índice 4)
            if (posActual === -1 && valorDado === 6) {
                posActual = 4; 
            } else if (posActual !== -1) {
                posActual += valorDado;
            }

            if (posActual < arraysCoordenadas[color].length) {
                posicionesFichas[color][index] = posActual;
                const ficha = document.getElementById(`${color}-${index}`);
                const nuevaCoord = arraysCoordenadas[color][posActual];
                ficha.style.top = nuevaCoord[0] + "%";
                ficha.style.left = nuevaCoord[1] + "%";
                valorDado = 0; // Reiniciar dado tras mover
            }
        }

        function lanzarDado() {
            valorDado = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dado-img').src = `imagen/dado_${valorDado}.png`;
            document.getElementById('dado-img').style.display = 'inline-block';
            // Aquí puedes añadir lógica para bloquear si no sacan 6 para sacar ficha
        }

        crearFichasBase('Verde');
        crearFichasBase('Amarillo');
        crearFichasBase('Azul');
        crearFichasBase('Rojo');
    </script>
</body>
</html>
