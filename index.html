        #contenedor-tablero { position: relative; width: 90vmin; height: 90vmin; }
        #tablero-img { width: 100%; height: 100%; display: block; }

        .ficha {
            position: absolute; width: 5%; height: 5%;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%); z-index: 10;
            cursor: pointer;
        }

        #area-juego { margin-top: 20px; text-align: center; }
        #dado-img { width: 80px; height: 80px; margin: 10px; display: none; }
        #indicador-turno { font-size: 20px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>

        const verdes = [[13.1, 27.9], [13.0, 13.7], [27.6, 13.8], [28.2, 28.6], [43.5, 11.5], [43.4, 17.6], [43.4, 23.9], [43.5, 31.2], [43.4, 37.4], [36.9, 43.4], [30.1, 44.3], [23.4, 44.4], [17.0, 44.3], [10.1, 44.0], [3.8, 44.1], [4.2, 50.7], [3.5, 57.1], [10.0, 57.6], [16.9, 57.9], [24.1, 57.5], [30.5, 57.3], [36.3, 57.4], [43.3, 64.5], [43.7, 70.5], [43.9, 77.7], [43.4, 84.2], [43.1, 90.7], [43.3, 97.1], [49.7, 97.2], [56.7, 96.9], [57.0, 90.1], [56.5, 83.8], [56.4, 76.2], [56.5, 70.7], [56.8, 63.4], [62.9, 56.9], [69.5, 57.4], [76.3, 57.3], [83.6, 57.3], [89.4, 57.3], [96.2, 57.5], [96.3, 51.4], [96.8, 44.1], [89.8, 43.8], [82.7, 43.8], [76.2, 43.7], [69.2, 44.6], [62.4, 44.2], [56.8, 36.6], [56.5, 30.5], [56.3, 24.1], [56.5, 17.3], [56.5, 10.8], [56.5, 4.2], [50.1, 3.9], [49.6, 11.3], [50.1, 18.6], [49.6, 24.8], [49.7, 31.4], [49.6, 37.9], [49.6, 45.4]];

        const rutas = { 'red': rojos, 'blue': azules, 'green': verdes, 'yellow': amarillos };
        let estadoFichas = { 'red': [-1,-1,-1,-1], 'blue': [-1,-1,-1,-1], 'green': [-1,-1,-1,-1], 'yellow': [-1,-1,-1,-1] };

        function crearFichasBase(lista, color) {
            const contenedor = document.getElementById('contenedor-tablero');
            const base = lista.slice(0, 4);
            base.forEach((coord, index) => {
                const ficha = document.createElement('div');
                ficha.className = 'ficha';
                ficha.style.backgroundColor = nombresColores[color];
                ficha.style.top = coord[0] + "%";
                ficha.style.left = coord[1] + "%";
                ficha.id = `${nombresColores[color]}-${index}`;
                ficha.onclick = () => mover(nombresColores[color], index);
                contenedor.appendChild(ficha);
            });
        }

        crearFichasBase(verdes, 'Verde');
        crearFichasBase(amarillos, 'Amarillo');
        crearFichasBase(azules, 'Azul');
        crearFichasBase(rojos, 'Rojo');

        function lanzarDado() {
            ultimoValorDado = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dado-img').src = `imagen/dado_${ultimoValorDado}.png`;
            document.getElementById('dado-img').style.display = 'inline-block';
            turno = (turno + 1) % 4;
            document.getElementById('indicador-turno').innerText = `Turno: ${colores[turno]}`;
        }

        function mover(color, i) {
            if (ultimoValorDado === 0) return;
            let pos = estadoFichas[color][i];
            if (pos === -1 && ultimoValorDado === 6) pos = 0;
            else if (pos !== -1) pos += ultimoValorDado;

            if (pos >= 0 && pos < rutas[color].length) {
                estadoFichas[color][i] = pos;
                const ficha = document.getElementById(`${color}-${i}`);
                ficha.style.top = rutas[color][pos][0] + "%";
                ficha.style.left = rutas[color][pos][1] + "%";
                ultimoValorDado = 0; // Turno usado
            }
        }
    </script>
