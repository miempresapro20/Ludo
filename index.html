<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ludo Family: Motor Versión Final Multiplayer</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        #contenedor-tablero { position: relative; width: 90vmin; height: 90vmin; border: 5px solid #34495e; border-radius: 10px; overflow: hidden; }
        #tablero-img { width: 100%; height: 100%; display: block; }
        
        .ficha { 
            position: absolute; width: 5%; height: 5%; border-radius: 50%; 
            border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5); 
            transform: translate(-50%, -50%); z-index: 10; cursor: pointer; 
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
        }
        
        .badge-grupo { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            align-items: center; justify-content: center; background: rgba(0,0,0,0.5); 
            border-radius: 50%; color: white; font-size: 14px; font-weight: bold; 
            z-index: 999; pointer-events: none; border: 1px solid white;
        }

        .meta-ui { 
            position: absolute; font-size: 24px; font-weight: bold; 
            color: #ffffff; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 2px 2px 4px rgba(0,0,0,0.8); 
            z-index: 5; pointer-events: none; transform: translate(-50%, -50%);
        }
        
        #area-juego { margin-top: 20px; text-align: center; width: 100%; max-width: 500px; }
        #dado-img { width: 80px; height: 80px; margin: 10px; display: none; }
        #indicador-turno { font-size: 22px; margin-bottom: 10px; font-weight: bold; padding: 10px; border-radius: 8px; }
        
        /* Estilos de Clasificación */
        #seccion-clasificacion { margin-top: 25px; width: 100%; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; }
        .puesto-item { display: flex; justify-content: space-between; padding: 10px 20px; margin: 5px 0; border-radius: 8px; background: #34495e; border-left: 10px solid transparent; }
        
        .btn { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; border-radius: 5px; border: none; font-weight: bold; }
        
        /* Botones de Lobby desactivados */
        #botones-colores .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="capa-lobby" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
        <h2 id="titulo-lobby">Configuración de Partida</h2>
        
        <div id="paso-1">
            <input type="text" id="input-nick" placeholder="Tu Apodo" style="padding: 10px; font-size: 18px; border-radius: 5px; border: none; width: 250px; text-align: center;"><br><br>
            <button class="btn" style="background: #3498db; color: white;" onclick="validarNick()">Siguiente</button>
        </div>

        <div id="paso-2" style="display: none;">
            <p id="info-sala" style="color: #f1c40f; font-weight: bold; font-size: 20px;"></p>
            <p>Selecciona un color disponible:</p>
            <div id="botones-colores" style="display: flex; flex-direction: column; gap: 10px; max-width: 200px; margin: 0 auto;">
                <button id="btn-color-0" class="btn" onclick="elegirColor(0)" style="background: green; color: white;">Verde</button>
                <button id="btn-color-1" class="btn" onclick="elegirColor(1)" style="background: #f1c40f; color: black;">Amarillo</button>
                <button id="btn-color-2" class="btn" onclick="elegirColor(2)" style="background: blue; color: white;">Azul</button>
                <button id="btn-color-3" class="btn" onclick="elegirColor(3)" style="background: red; color: white;">Rojo</button>
            </div>
            <p id="msg-espera" style="margin-top: 20px; font-style: italic; color: #bdc3c7;"></p>
            <button id="btn-iniciar-partida" class="btn" style="display: none; background: #27ae60; color: white; margin-top: 15px;" onclick="iniciarPartidaOficial()">¡COMENZAR JUEGO!</button>
            
            <div style="margin-top: 30px; background: #34495e; padding: 15px; border-radius: 8px;">
                <p style="font-size: 14px; margin-top: 0;">Comparte este link para invitar:</p>
                <input type="text" id="link-compartir" readonly style="width: 100%; padding: 8px; font-size: 12px; border-radius: 4px; border: none; text-align: center; color: #333;" onclick="this.select()">
            </div>
        </div>
    </div>
    <h1>Ludo Family</h1>
    <div id="contenedor-tablero">
        <img id="tablero-img" src="imagen/tablero_limpio.png" alt="Tablero">
        <div id="ui-green" class="meta-ui" style="top: 45%; left: 45%;"></div>
        <div id="ui-yellow" class="meta-ui" style="top: 45%; left: 55%;"></div>
        <div id="ui-blue" class="meta-ui" style="top: 55%; left: 55%;"></div>
        <div id="ui-red" class="meta-ui" style="top: 55%; left: 45%;"></div>
    </div>

    <div id="area-juego">
        <div id="indicador-turno" style="background-color: green;">
            <span id="texto-turno">Turno: Verde</span>
            <span id="temporizador-ui" style="float: right;">⏱ 30s</span>
        </div>
        <img id="dado-img" src="" alt="Dado">
        <br>
        <button id="btn-lanzar" class="btn" style="background-color: #27ae60; color: white;" onclick="lanzarDado()">Lanzar Dado</button>
        <button id="btn-reiniciar" class="btn" style="background-color: #e74c3c; color: white;" onclick="reiniciarJuego()">Reiniciar Partida</button>

        <div id="seccion-clasificacion">
            <h3 style="margin-top: 0;">Tabla de Posiciones</h3>
            <div id="lista-clasificacion"></div>
        </div>
        
        <div id="espacio-chat" style="margin-top: 30px; padding: 20px; border: 1px dashed #7f8c8d; color: #7f8c8d;">
            [ Reserva para Chat en Línea de los 4 Jugadores ]
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyANAn_VqAg_Sa0-ZQl9UOLh7mkew-uddE8",
            authDomain: "ludofamily-aed5a.firebaseapp.com",
            projectId: "ludofamily-aed5a",
            storageBucket: "ludofamily-aed5a.firebasestorage.app",
            messagingSenderId: "668858748639",
            appId: "1:668858748639:web:e7fefe14b21352ff5be36a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // --- SISTEMA DE LOBBY Y SALAS ---
        let partidaRef; // Se inicializará cuando comience el juego
        let miColorIdx = null; 
        let apodo = "";
        
        const urlParams = new URLSearchParams(window.location.search);
        let idSala = urlParams.get('sala');
        if (!idSala) idSala = Math.floor(1000 + Math.random() * 9000).toString();

        const linkCompleto = window.location.origin + window.location.pathname + "?sala=" + idSala;
        document.getElementById('link-compartir').value = linkCompleto;

        const salaRef = db.ref('salas/' + idSala);
        const jugadoresRef = salaRef.child('jugadores');

        function validarNick() {
            apodo = document.getElementById('input-nick').value.trim();
            if (apodo.length < 2) return alert("Por favor, escribe un apodo válido.");
            document.getElementById('paso-1').style.display = 'none';
            document.getElementById('paso-2').style.display = 'block';
            document.getElementById('info-sala').innerText = "Sala: " + idSala;
            escucharJugadoresLobby();
        }

        function escucharJugadoresLobby() {
            jugadoresRef.on('value', (snapshot) => {
                const jugadores = snapshot.val() || {};
                const coloresLocales = ['Verde', 'Amarillo', 'Azul', 'Rojo'];
                
                coloresLocales.forEach((colorTxt, idx) => {
                    const btn = document.getElementById(`btn-color-${idx}`);
                    const ocupado = Object.values(jugadores).find(j => j.colorIdx === idx);
                    
                    if (ocupado) {
                        btn.disabled = true;
                        btn.innerText = `${colorTxt} (${ocupado.nick})`;
                    } else {
                        btn.disabled = false;
                        btn.innerText = colorTxt;
                    }
                });

                const numJugadores = Object.keys(jugadores).length;
                if (numJugadores >= 2 && miColorIdx !== null) {
                    document.getElementById('msg-espera').innerText = `Jugadores listos: ${numJugadores}/4`;
                    document.getElementById('btn-iniciar-partida').style.display = 'inline-block';
                }
            });

            salaRef.child('estado').on('value', (snapshot) => {
                if (snapshot.val() === 'jugando') {
                    document.getElementById('capa-lobby').style.display = 'none';
                    conectarMotorAFirebase();
                }
            });
        }

        function elegirColor(idx) {
            miColorIdx = idx;
            jugadoresRef.push({ nick: apodo, colorIdx: idx });
            document.getElementById('botones-colores').style.display = 'none';
            document.getElementById('msg-espera').innerText = "Esperando a que alguien inicie la partida...";
        }

        function iniciarPartidaOficial() {
            salaRef.update({ estado: 'jugando' });
        }

        // --- CONEXIÓN DEL MOTOR A FIREBASE ---
        function conectarMotorAFirebase() {
            partidaRef = db.ref('salas/' + idSala + '/partida');
            
            partidaRef.on('value', (snapshot) => {
                if (ignorarSincronizacion) return;
                const data = snapshot.val();
                if (data) {
                    turno = data.turno !== undefined ? data.turno : 0;
                    valorDado = data.valorDado !== undefined ? data.valorDado : 0;
                    intentosSalida = data.intentosSalida !== undefined ? data.intentosSalida : 0;
                    fichasEnMeta = data.fichasEnMeta || { 'green': 0, 'yellow': 0, 'blue': 0, 'red': 0 };
                    clasificacion = data.clasificacion || [];
                    grupos = data.grupos || {};
                    
                    if (data.estadoFichas) {
                        codigosColor.forEach(c => { estadoFichas[c] = data.estadoFichas[c] || [-1, -1, -1, -1]; });
                    }
                    actualizarVistaDesdeFirebase();
                }
            });

            partidaRef.once('value').then((snapshot) => {
                if (!snapshot.exists()) guardarEstadoEnFirebase();
            });
        }

        let ignorarSincronizacion = false;

        // --- VARIABLES GLOBALES DEL JUEGO ---
        let turno = 0; 
        let valorDado = 0;
        let intentosSalida = 0;
        let fichasEnMeta = { 'green': 0, 'yellow': 0, 'blue': 0, 'red': 0 };
        let clasificacion = [];
        let grupos = {}; 
        
        const colores = ['Verde', 'Amarillo', 'Azul', 'Rojo'];
        const codigosColor = ['green', 'yellow', 'blue', 'red'];
        const COORDENADA_SALIDA = 4;

        const rutas = {
            'red': [[72.0, 28.5], [71.9, 12.2], [87.3, 14.1], [87.8, 29.0], [89.8, 44.1], [83.1, 43.9], [75.8, 44.0], [69.1, 44.1], [63.2, 44.6], [56.3, 37.6], [55.9, 30.6], [56.0, 23.9], [56.1, 17.3], [56.1, 11.0], [56.4, 4.4], [49.9, 4.2], [43.5, 3.7], [43.6, 10.4], [43.3, 18.4], [43.2, 24.4], [43.3, 30.6], [43.6, 38.1], [36.8, 44.3], [29.7, 43.9], [23.1, 44.0], [16.9, 44.1], [10.0, 44.1], [3.5, 44.2], [3.8, 50.8], [3.6, 57.5], [9.7, 57.1], [16.9, 57.9], [24.1, 58.0], [30.0, 57.5], [37.0, 56.8], [43.6, 63.9], [43.6, 70.6], [43.7, 77.0], [43.4, 84.4], [43.7, 90.9], [43.4, 97.1], [49.7, 96.6], [56.5, 96.5], [56.8, 90.6], [56.5, 83.4], [57.5, 76.8], [56.9, 70.2], [56.9, 63.8], [63.8, 56.7], [69.8, 57.0], [76.4, 57.3], [82.4, 57.5], [89.1, 57.1], [96.0, 57.9], [96.2, 50.7], [89.0, 50.7], [83.2, 50.3], [76.4, 50.6], [68.9, 51.0], [62.9, 51.2], [55.9, 51.0]],
            'blue': [[72.4, 73.1], [86.9, 73.5], [86.8, 88.4], [72.5, 87.4], [56.5, 91.4], [56.1, 83.9], [56.1, 77.1], [56.5, 70.5], [56.0, 64.2], [62.4, 58.0], [69.9, 56.7], [76.1, 57.1], [82.7, 57.1], [90.3, 56.7], [95.8, 57.3], [96.6, 50.9], [96.3, 43.5], [90.4, 43.9], [83.0, 43.9], [76.2, 43.5], [70.0, 44.3], [63.0, 43.8], [56.4, 37.2], [56.8, 30.3], [56.3, 24.8], [56.8, 17.7], [56.5, 11.2], [56.9, 4.4], [49.7, 3.9], [42.6, 3.7], [43.3, 10.8], [43.6, 18.0], [43.9, 24.4], [43.5, 30.5], [44.0, 37.5], [36.8, 44.1], [30.0, 44.2], [23.3, 43.7], [16.9, 43.9], [10.3, 43.7], [4.2, 43.9], [3.3, 50.6], [3.7, 57.5], [11.0, 57.1], [16.6, 57.5], [23.4, 57.1], [29.9, 57.1], [36.8, 56.9], [43.3, 63.9], [43.7, 70.3], [43.7, 77.2], [43.5, 83.7], [43.9, 90.2], [43.5, 97.3], [50.0, 97.2], [50.2, 90.2], [50.5, 83.4], [50.4, 76.5], [50.4, 69.7], [49.6, 64.4], [50.4, 56.6]],
            'green': [[13.1, 27.9], [13.0, 13.7], [27.6, 13.8], [28.2, 28.6], [43.5, 11.5], [43.4, 17.6], [43.4, 23.9], [43.5, 31.2], [43.4, 37.4], [36.9, 43.4], [30.1, 44.3], [23.4, 44.4], [17.0, 44.3], [10.1, 44.0], [3.8, 44.1], [4.2, 50.7], [3.5, 57.1], [10.0, 57.6], [16.9, 57.9], [24.1, 57.5], [30.5, 57.3], [36.3, 57.4], [43.3, 64.5], [43.7, 70.5], [43.9, 77.7], [43.4, 84.2], [43.1, 90.7], [43.3, 97.1], [49.7, 97.2], [56.7, 96.9], [57.0, 90.1], [56.5, 83.8], [56.4, 76.2], [56.5, 70.7], [56.8, 63.4], [62.9, 56.9], [69.5, 57.4], [76.3, 57.3], [83.6, 57.3], [89.4, 57.3], [96.2, 57.5], [96.3, 51.4], [96.8, 44.1], [89.8, 43.8], [82.7, 43.8], [76.2, 43.7], [69.2, 44.6], [62.4, 44.2], [56.8, 36.6], [56.5, 30.5], [56.3, 24.1], [56.5, 17.3], [56.5, 10.8], [56.5, 4.2], [50.1, 3.9], [49.6, 11.3], [50.1, 18.6], [49.6, 24.8], [49.7, 31.4], [49.6, 37.9], [49.6, 45.4]],
            'yellow': [[28.0, 73.6], [28.0, 88.0], [13.9, 87.5], [13.6, 73.1], [9.8, 57.8], [16.5, 57.4], [24.1, 57.0], [29.6, 57.3], [36.5, 56.9], [43.1, 63.4], [43.7, 70.1], [43.3, 76.9], [42.9, 84.4], [43.5, 90.5], [43.4, 96.9], [49.7, 96.5], [56.4, 96.8], [56.9, 90.2], [56.8, 83.7], [56.8, 77.1], [56.5, 70.5], [56.4, 63.4], [62.8, 57.1], [69.2, 57.0], [75.9, 57.5], [83.2, 57.3], [90.0, 57.5], [96.7, 57.7], [96.5, 51.4], [96.2, 44.2], [89.3, 44.4], [83.3, 44.1], [75.6, 44.0], [69.7, 44.2], [62.7, 43.0], [56.4, 36.6], [56.2, 30.3], [56.0, 24.0], [56.2, 17.0], [56.0, 11.1], [56.3, 4.5], [49.6, 3.7], [43.5, 4.2], [42.9, 9.9], [43.2, 17.3], [43.2, 24.8], [43.4, 31.0], [43.3, 38.2], [36.9, 44.2], [30.0, 44.1], [23.6, 43.9], [17.4, 44.1], [9.6, 44.0], [3.8, 43.2], [2.9, 50.7], [10.0, 50.9], [16.6, 51.4], [23.0, 51.2], [30.0, 50.7], [36.7, 50.7], [43.9, 50.7]]
        };
        
        let estadoFichas = {};
        codigosColor.forEach(c => estadoFichas[c] = [-1, -1, -1, -1]);

        function guardarEstadoEnFirebase() {
            if (!partidaRef) return;
            ignorarSincronizacion = true;
            partidaRef.set({
                turno: turno,
                valorDado: valorDado,
                intentosSalida: intentosSalida,
                fichasEnMeta: fichasEnMeta,
                clasificacion: clasificacion,
                grupos: grupos,
                estadoFichas: estadoFichas
            }).then(() => {
                setTimeout(() => ignorarSincronizacion = false, 500);
            });
        }

        function actualizarVistaDesdeFirebase() {
            if (clasificacion.length >= 3) {
                document.getElementById('indicador-turno').innerHTML = `<span id="texto-turno">FIN DE PARTIDA</span>`;
                document.getElementById('btn-lanzar').disabled = true;
                detenerTemporizador();
            } else {
                const colorAct = codigosColor[turno];
                document.getElementById('indicador-turno').innerHTML = `<span id="texto-turno">Turno: ${colores[turno]}</span><span id="temporizador-ui" style="float: right;">⏱ 30s</span>`;
                document.getElementById('indicador-turno').style.backgroundColor = colorAct;
            }

            if (valorDado > 0) {
                document.getElementById('dado-img').src = `imagen/dado_${valorDado}.png`;
                document.getElementById('dado-img').style.display = 'inline-block';
                document.getElementById('btn-lanzar').disabled = true;
            } else {
                document.getElementById('dado-img').style.display = 'none';
                document.getElementById('btn-lanzar').disabled = (clasificacion.length >= 3);
            }

            codigosColor.forEach(c => {
                actualizarMetaUI(c);
                estadoFichas[c].forEach((pos, idx) => {
                    const ficha = document.getElementById(`${c}-${idx}`);
                    if (ficha) {
                        if (pos === -1) {
                            ficha.style.top = ficha.dataset.baseX + "%";
                            ficha.style.left = ficha.dataset.baseY + "%";
                            ficha.style.display = 'flex';
                        } else if (pos >= rutas[c].length - 1) {
                            ficha.style.display = 'none';
                        } else {
                            ficha.style.top = rutas[c][pos][0] + "%";
                            ficha.style.left = rutas[c][pos][1] + "%";
                            ficha.style.display = 'flex';
                        }
                    }
                });
            });

            actualizarDistintivos();
            actualizarClasificacion();
            actualizarEventosClic();
            iniciarTemporizador(); 
        }

        // --- SISTEMA DE TEMPORIZADOR ---
        let tiempoRestante = 30;
        let intervaloTemporizador;

        function actualizarUITemporizador() {
            const tempUI = document.getElementById('temporizador-ui');
            if (tempUI) {
                tempUI.innerText = `⏱ ${tiempoRestante}s`;
                if (tiempoRestante <= 5) tempUI.style.color = '#ffcccb'; 
                else tempUI.style.color = 'white';
            }
        }

        function iniciarTemporizador() {
            clearInterval(intervaloTemporizador);
            tiempoRestante = 30;
            actualizarUITemporizador();
            intervaloTemporizador = setInterval(() => {
                tiempoRestante--;
                actualizarUITemporizador();
                if (tiempoRestante <= 0) {
                    clearInterval(intervaloTemporizador);
                    // Solo el dueño del turno debe ejecutar pasarTurno por inactividad para no duplicar llamadas a Firebase
                    if (miColorIdx !== null && turno === miColorIdx) {
                        pasarTurno(); 
                    }
                }
            }, 1000);
        }

        function detenerTemporizador() {
            clearInterval(intervaloTemporizador);
            tiempoRestante = 30;
            actualizarUITemporizador();
        }

        // --- FUNCIONES DEL MOTOR DEL JUEGO ---
        function actualizarDistintivos() {
            document.querySelectorAll('.badge-grupo').forEach(b => b.remove());
            Object.keys(grupos).forEach(key => {
                let grupo = grupos[key];
                if (grupo.length > 1) {
                    grupo.forEach(idFicha => {
                        const ficha = document.getElementById(idFicha);
                        if (ficha) {
                            const badge = document.createElement('div');
                            badge.className = 'badge-grupo';
                            badge.innerText = grupo.length;
                            ficha.appendChild(badge);
                        }
                    });
                }
            });
        }

        function actualizarMetaUI(color) {
            const el = document.getElementById(`ui-${color}`);
            el.innerText = fichasEnMeta[color] > 0 ? fichasEnMeta[color] : "";
        }

        function actualizarClasificacion() {
            const lista = document.getElementById('lista-clasificacion');
            lista.innerHTML = "";
            clasificacion.forEach((color, index) => {
                const item = document.createElement('div');
                item.className = 'puesto-item';
                item.style.borderColor = color;
                item.innerHTML = `<span>#${index + 1} Lugar</span> <span style="color:${color}">${color.toUpperCase()}</span>`;
                lista.appendChild(item);
            });
        }

        function realizarMovimiento(color, i) {
            // PROTECCIÓN: Solo el dueño del color puede mover
            if (miColorIdx === null || turno !== miColorIdx) return;
            if (valorDado === 0 || color !== codigosColor[turno]) return;
            
            let grupoKey = Object.keys(grupos).find(key => grupos[key].includes(`${color}-${i}`));
            let fichasAMover = grupoKey ? grupos[grupoKey] : [`${color}-${i}`];
            
            let posActual = estadoFichas[color][i];
            let totalCasillas = rutas[color].length;
            let nuevaPos;
            
            if (posActual === -1) {
                if (valorDado === 6 || valorDado === 1) nuevaPos = COORDENADA_SALIDA;
                else return;
            } else {
                nuevaPos = posActual + valorDado;
            }
            
            if (nuevaPos >= totalCasillas) {
                let exceso = nuevaPos - (totalCasillas - 1);
                nuevaPos = (totalCasillas - 1) - exceso;
            }
            
            if (nuevaPos === totalCasillas - 1) {
                fichasEnMeta[color] += fichasAMover.length;
                fichasAMover.forEach(id => document.getElementById(id).style.display = 'none');
                actualizarMetaUI(color);

                Object.keys(grupos).forEach(key => {
                    grupos[key] = grupos[key].filter(id => !fichasAMover.includes(id));
                    if (grupos[key].length <= 1) delete grupos[key];
                });

                if (fichasEnMeta[color] >= 4 && !clasificacion.includes(color)) {
                    clasificacion.push(color);
                    actualizarClasificacion();
                }
            } else {
                fichasAMover.forEach(id => {
                    let [c, idx] = id.split('-');
                    estadoFichas[c][idx] = nuevaPos;
                    const ficha = document.getElementById(id);
                    ficha.style.top = rutas[c][nuevaPos][0] + "%";
                    ficha.style.left = rutas[c][nuevaPos][1] + "%";
                });

                Object.keys(grupos).forEach(key => {
                    grupos[key] = grupos[key].filter(id => !fichasAMover.includes(id));
                    if (grupos[key].length <= 1) delete grupos[key];
                });

                let todasEnDestino = [];
                estadoFichas[color].forEach((p, idx) => {
                    if (p === nuevaPos && document.getElementById(`${color}-${idx}`).style.display !== 'none') {
                        todasEnDestino.push(`${color}-${idx}`);
                    }
                });

                if (todasEnDestino.length > 1) {
                    if (nuevaPos === COORDENADA_SALIDA) {
                        if (confirm("¿Deseas acoplar las fichas en la salida?")) {
                            grupos[`${color}-${nuevaPos}`] = todasEnDestino;
                        }
                    } else {
                        grupos[`${color}-${nuevaPos}`] = todasEnDestino;
                    }
                }
                verificarCaptura(color, nuevaPos);
            }
            
            actualizarDistintivos();
            
            if (fichasEnMeta[color] >= 4 || (valorDado !== 1 && valorDado !== 6)) {
                pasarTurno();
            } else { 
                valorDado = 0; 
                document.getElementById('dado-img').style.display = 'none'; 
                document.getElementById('btn-lanzar').disabled = false; 
                iniciarTemporizador(); 
                guardarEstadoEnFirebase();
            }
        }

        function verificarCaptura(colorJugador, posActual) {
            const posCoords = rutas[colorJugador][posActual];
            const margen = 2.0; 
            
            let esZonaSegura = codigosColor.some(c => {
                let estrella = rutas[c][COORDENADA_SALIDA];
                return Math.abs(estrella[0] - posCoords[0]) < margen && Math.abs(estrella[1] - posCoords[1]) < margen;
            });

            if (esZonaSegura) return;

            codigosColor.forEach(c => {
                if (c === colorJugador) return;
                estadoFichas[c].forEach((p, idx) => {
                    if (p === -1 || p >= rutas[c].length - 1) return;
                    let pEnemigo = rutas[c][p];
                    if (Math.abs(pEnemigo[0] - posCoords[0]) < margen && Math.abs(pEnemigo[1] - posCoords[1]) < margen) {
                        estadoFichas[c][idx] = -1;
                        const fichaDefensora = document.getElementById(`${c}-${idx}`);
                        fichaDefensora.style.top = fichaDefensora.dataset.baseX + "%";
                        fichaDefensora.style.left = fichaDefensora.dataset.baseY + "%";
                        Object.keys(grupos).forEach(key => {
                            if(grupos[key].includes(`${c}-${idx}`)) delete grupos[key];
                        });
                    }
                });
            });
            actualizarDistintivos();
        }

        function lanzarDado() {
            // PROTECCIÓN: Solo el dueño del color puede lanzar
            if (miColorIdx === null || turno !== miColorIdx) {
                alert("No es tu turno. Espera a que tire el jugador " + colores[turno]);
                return;
            }

            let actual = codigosColor[turno];
            let todasEnBase = estadoFichas[actual].every(pos => pos === -1);
            valorDado = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dado-img').src = `imagen/dado_${valorDado}.png`;
            document.getElementById('dado-img').style.display = 'inline-block';
            
            if (todasEnBase) {
                if (valorDado === 6 || valorDado === 1) { 
                    intentosSalida = 0; 
                    document.getElementById('btn-lanzar').disabled = false; 
                    iniciarTemporizador(); 
                    guardarEstadoEnFirebase();
                }
                else { 
                    intentosSalida++; 
                    if (intentosSalida >= 3) { 
                        intentosSalida = 0; 
                        detenerTemporizador();
                        guardarEstadoEnFirebase();
                        setTimeout(pasarTurno, 1000); 
                    } else {
                        iniciarTemporizador(); 
                        guardarEstadoEnFirebase();
                    }
                }
            } else { 
                document.getElementById('btn-lanzar').disabled = true; 
                iniciarTemporizador(); 
                guardarEstadoEnFirebase();
            }
        }

        function pasarTurno() {
            detenerTemporizador(); 
            if (clasificacion.length >= 3) {
                let ultimo = codigosColor.find(c => !clasificacion.includes(c));
                if(ultimo && !clasificacion.includes(ultimo)) {
                    clasificacion.push(ultimo);
                    actualizarClasificacion();
                }
                document.getElementById('indicador-turno').innerHTML = `<span id="texto-turno">FIN DE PARTIDA</span>`;
                document.getElementById('btn-lanzar').disabled = true;
                guardarEstadoEnFirebase();
                return; 
            }
            valorDado = 0;
            document.getElementById('dado-img').style.display = 'none';
            document.getElementById('btn-lanzar').disabled = false;
            let turnosBuscados = 0;
            do { turno = (turno + 1) % 4; turnosBuscados++; } while (clasificacion.includes(codigosColor[turno]) && turnosBuscados < 4);
            const colorAct = codigosColor[turno];
            
            document.getElementById('indicador-turno').innerHTML = `<span id="texto-turno">Turno: ${colores[turno]}</span><span id="temporizador-ui" style="float: right;">⏱ 30s</span>`;
            document.getElementById('indicador-turno').style.backgroundColor = colorAct;
            
            actualizarEventosClic();
            iniciarTemporizador(); 
            guardarEstadoEnFirebase();
        }

        function actualizarEventosClic() {
            codigosColor.forEach(c => {
                for (let i = 0; i < 4; i++) {
                    const ficha = document.getElementById(`${c}-${i}`);
                    // Se desactiva la selección visual si no es el turno, 
                    // independientemente de la protección interna de realizarMovimiento
                    if (ficha) { ficha.style.pointerEvents = (c === codigosColor[turno] && !clasificacion.includes(c)) ? 'auto' : 'none'; }
                }
            });
        }

        function crearFichasBase(lista, color) {
            const contenedor = document.getElementById('contenedor-tablero');
            lista.slice(0, 4).forEach((coord, i) => {
                const ficha = document.createElement('div');
                ficha.className = 'ficha';
                ficha.style.backgroundColor = color;
                ficha.style.top = coord[0] + "%";
                ficha.style.left = coord[1] + "%";
                ficha.dataset.baseX = coord[0];
                ficha.dataset.baseY = coord[1];
                ficha.id = `${color}-${i}`;
                ficha.onclick = () => realizarMovimiento(color, i);
                contenedor.appendChild(ficha);
            });
        }

        function reiniciarJuego() {
            if (confirm("¿Seguro que deseas reiniciar la sala completa?")) { 
                salaRef.remove().then(() => {
                    location.search = ""; // Quita el ID de la URL y recarga creando una nueva sala
                });
            }
        }

        // Inicio Estructural del Tablero Local (Detrás del Lobby)
        codigosColor.forEach(c => {
            crearFichasBase(rutas[c], c);
            actualizarMetaUI(c);
        });
        actualizarClasificacion();
        actualizarEventosClic();
    </script>
</body>
</html>
