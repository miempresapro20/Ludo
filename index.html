<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; }
        
        #contenedor-tablero {
            position: relative;
            width: 90vmin;
            height: 90vmin;
        }

        #tablero-img {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ficha {
            position: absolute;
            font-size: 30px;
            transition: all 0.3s;
            /* Ajusta esto según el tamaño de tu tablero */
            top: 5%; 
            left: 5%;
        }
    </style>
</head>
<body>

    <h1>Ludo Family</h1>
    <div id="contenedor-tablero">
        <img id="tablero-img" src="imagen/tablero_limpio.png" alt="Tablero">
        <div id="ficha">🔴</div>
    </div>

    <button onclick="moverFicha()" style="padding: 15px; margin-top: 20px; cursor: pointer;">Lanzar Dado</button>

    <script>
        // Esta función mueve la ficha
        function moverFicha() {
            let ficha = document.getElementById('ficha');
            // Un movimiento simple de prueba para verla saltar
            let nuevaPos = Math.random() * 80 + 5; 
            ficha.style.top = nuevaPos + "%";
            ficha.style.left = nuevaPos + "%";
        }
    </script>
</body>
</html>
