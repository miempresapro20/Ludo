<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ludo Family: Motor de Juego</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        #contenedor-tablero { position: relative; width: 90vmin; height: 90vmin; }
        #tablero-img { width: 100%; height: 100%; display: block; }
        
        .ficha-juego {
            position: absolute;
            width: 5%; height: 5%;
            border-radius: 50%;
            border: 2px solid white;
            z-index: 10;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        #area-juego { margin-top: 20px; text-align: center; }
        #dado-img { width: 80px; height: 80px; display: none; }
    </style>
</head>
<body>

    <h1>Ludo Family</h1>
    <div id="contenedor-tablero"><img id="tablero-img" src="imagen/tablero_limpio.png" alt="Tablero"></div>

    <div id="area-juego">
        <h2 id="texto-turno">Turno: Verde</h2>
        <img id="dado-img" src="" alt="Dado">
        <br>
        <button onclick="lanzarDado()" id="btn-dado">Lanzar Dado</button>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        let turnoActual = 0; // 0:Verde, 1:Amarillo, 2:Azul, 3:Rojo
        let valorDado = 0;
        const colores = ['green', 'yellow', 'blue', 'red'];
        
        // Posiciones iniciales (Base/Casa)
        const posicionesBase = {
            'green': [[13.1, 27.9], [13.0, 13.7], [27.6, 13.8], [28.2, 28.6]],
            'yellow': [[28.0, 73.6], [28.0, 88.0], [13.9, 87.5], [13.6, 73.1]],
            'blue': [[72.4, 73.1], [86.9, 73.5], [86.8, 88.4], [72.5, 87.4]],
            'red': [[72.0, 28.5], [71.9, 12.2], [87.3, 14.1], [87.8, 29.0]]
        };

        // --- INICIALIZACIÓN ---
        function inicializarFichas() {
            const contenedor = document.getElementById('contenedor-tablero');
            colores.forEach(color => {
                posicionesBase[color].forEach((pos, i) => {
                    const ficha = document.createElement('div');
                    ficha.className = 'ficha-juego';
                    ficha.style.backgroundColor = color;
                    ficha.style.top = pos[0] + "%";
                    ficha.style.left = pos[1] + "%";
                    ficha.id = `${color}-${i}`;
                    ficha.onclick = () => moverFicha(ficha, color);
                    contenedor.appendChild(ficha);
                });
            });
        }

        // --- LÓGICA DE JUEGO ---
        function lanzarDado() {
            valorDado = Math.floor(Math.random() * 6) + 1;
            const dadoImg = document.getElementById('dado-img');
            dadoImg.src = `imagen/dado_${valorDado}.png`;
            dadoImg.style.display = 'inline-block';
            alert(`Jugador ${colores[turnoActual]} sacó un ${valorDado}. Haz clic en una ficha para moverla.`);
        }

        function moverFicha(elemento, color) {
            // Lógica simple de desplazamiento (incrementar top/left)
            // Aquí luego integraremos las coordenadas del camino completo
            console.log(`Moviendo ficha de ${color} según dado: ${valorDado}`);
            
            // Pasar turno
            turnoActual = (turnoActual + 1) % 4;
            document.getElementById('texto-turno').innerText = `Turno: ${colores[turnoActual].toUpperCase()}`;
        }

        inicializarFichas();
    </script>
</body>
</html>
