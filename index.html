<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ludo Family: Motor V5.3 (IA de Nivel Experto)</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        #contenedor-tablero { position: relative; width: 90vmin; height: 90vmin; border: 5px solid #34495e; border-radius: 10px; overflow: hidden; }
        #tablero-img { width: 100%; height: 100%; display: block; }
        
        .ficha { 
            position: absolute; width: 5%; height: 5%; border-radius: 50%; 
            border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5); 
            transform: translate(-50%, -50%); z-index: 10; cursor: pointer; 
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
        }
        
        .badge-grupo { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            align-items: center; justify-content: center; background: rgba(0,0,0,0.5); 
            border-radius: 50%; color: white; font-size: 14px; font-weight: bold; 
            z-index: 999; pointer-events: none; border: 1px solid white;
        }

        .meta-ui { 
            position: absolute; font-size: 24px; font-weight: bold; 
            color: #ffffff; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 2px 2px 4px rgba(0,0,0,0.8); 
            z-index: 5; pointer-events: none; transform: translate(-50%, -50%);
        }
        
        #area-juego { margin-top: 20px; text-align: center; width: 100%; max-width: 600px; }
        #dado-img { width: 80px; height: 80px; margin: 10px; display: none; }
        #indicador-turno { font-size: 22px; margin-bottom: 10px; font-weight: bold; padding: 10px; border-radius: 8px; transition: background 0.3s; }
        
        #controles-juego { display: flex; justify-content: space-between; align-items: center; padding: 10px; }
        .btn { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; border-radius: 8px; border: none; font-weight: bold; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        .btn-grande { padding: 15px 30px; font-size: 18px; display: block; width: 100%; max-width: 300px; margin: 10px auto; }
        .btn-pildora { padding: 15px 35px; font-size: 18px; border-radius: 30px; }
        #botones-colores .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        #contenedor-tablas { display: flex; gap: 15px; justify-content: space-between; margin-top: 20px; flex-wrap: wrap; }
        .seccion-tabla { flex: 1; min-width: 250px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; }
        .puesto-item { display: flex; justify-content: space-between; padding: 10px 15px; margin: 5px 0; border-radius: 8px; background: #34495e; border-left: 8px solid transparent; }
        
        #alerta-flotante { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #e74c3c; padding: 15px 30px; border-radius: 8px; z-index: 2000; font-weight: bold; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        #modal-decision { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; border: 3px solid #f1c40f; padding: 20px; border-radius: 15px; z-index: 3000; display: none; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 80%; max-width: 300px; }
        #modal-ganador { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a252f; border: 5px solid #f1c40f; padding: 40px; border-radius: 20px; z-index: 4000; display: none; text-align: center; box-shadow: 0 0 50px rgba(241,196,15,0.4); width: 90%; max-width: 400px; }
    </style>
</head>
<body>
    <div id="alerta-flotante">Mensaje</div>

    <div id="modal-decision">
        <p style="font-size: 18px; margin-bottom: 20px;">¿Deseas acoplar las fichas en la salida?</p>
        <button class="btn" style="background: #27ae60; color: white;" onclick="responderModalAcople(true)">SÍ</button>
        <button class="btn" style="background: #e74c3c; color: white;" onclick="responderModalAcople(false)">NO</button>
    </div>

    <div id="modal-ganador">
        <h2 style="color: #f1c40f; font-size: 30px; margin-top: 0;">¡Partida Terminada!</h2>
        <h3 id="texto-ganador" style="color: white; font-size: 20px; line-height: 1.5;"></h3>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn" style="flex: 1; background: #e67e22; color: white;" onclick="solicitarRevancha()">Jugar Revancha</button>
            <button class="btn" style="flex: 1; background: #3498db; color: white;" onclick="cerrarModalGanador()">Ver Tablero</button>
        </div>
    </div>

    <div id="capa-lobby" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
        <h2>Ludo Family</h2>
        <div id="paso-0">
            <button class="btn btn-grande" style="background: #8e44ad; color: white;" onclick="seleccionarModoJuego('local')">🕹️ JUGAR MODO LOCAL</button>
            <button class="btn btn-grande" style="background: #2980b9; color: white;" onclick="seleccionarModoJuego('online')">🌐 JUGAR ONLINE</button>
        </div>
        <div id="paso-1" style="display: none;">
            <input type="text" id="input-nick" placeholder="Tu Apodo" style="padding: 10px; font-size: 18px; border-radius: 5px; border: none; width: 250px; text-align: center;"><br><br>
            <button class="btn" style="background: #3498db; color: white;" onclick="validarNick()">Siguiente</button>
        </div>
        <div id="paso-2" style="display: none;">
            <p id="info-sala" style="color: #f1c40f; font-weight: bold; font-size: 20px;"></p>
            <p>Selecciona tu color:</p>
            <div id="botones-colores" style="display: flex; flex-direction: column; gap: 10px; max-width: 200px; margin: 0 auto;">
                <button id="btn-color-0" class="btn" onclick="elegirColor(0)" style="background: green; color: white;">Verde</button>
                <button id="btn-color-1" class="btn" onclick="elegirColor(1)" style="background: #f1c40f; color: black;">Amarillo</button>
                <button id="btn-color-2" class="btn" onclick="elegirColor(2)" style="background: blue; color: white;">Azul</button>
                <button id="btn-color-3" class="btn" onclick="elegirColor(3)" style="background: red; color: white;">Rojo</button>
            </div>
            <div id="controles-online" style="display: none;">
                <p id="msg-espera" style="margin-top: 20px; font-style: italic; color: #bdc3c7;"></p>
                <button id="btn-iniciar-partida" class="btn" style="display: none; background: #27ae60; color: white; margin-top: 15px;" onclick="iniciarPartidaOnline()">¡COMENZAR JUEGO!</button>
                <div style="margin-top: 30px; background: #34495e; padding: 15px; border-radius: 8px;">
                    <p style="font-size: 14px; margin-top: 0;">Comparte este link para invitar:</p>
                    <input type="text" id="link-compartir" readonly style="width: 100%; padding: 8px; font-size: 12px; border-radius: 4px; border: none; text-align: center; color: #333;" onclick="this.select()">
                </div>
            </div>
            <div id="controles-local" style="display: none; margin-top: 20px;">
                <p>¿Cuántos jugadores participarán?</p>
                <button class="btn" style="background: #27ae60; color: white;" onclick="iniciarPartidaLocal(2)">2 Jugadores</button>
                <button class="btn" style="background: #e67e22; color: white;" onclick="iniciarPartidaLocal(4)">4 Jugadores</button>
            </div>
        </div>
    </div>
    
    <h1>Ludo Family</h1>
    <div id="contenedor-tablero">
        <img id="tablero-img" src="imagen/tablero_limpio.png" alt="Tablero">
        <div id="ui-green" class="meta-ui" style="top: 45%; left: 45%;"></div>
        <div id="ui-yellow" class="meta-ui" style="top: 45%; left: 55%;"></div>
        <div id="ui-blue" class="meta-ui" style="top: 55%; left: 55%;"></div>
        <div id="ui-red" class="meta-ui" style="top: 55%; left: 45%;"></div>
    </div>

    <div id="area-juego">
        <div id="indicador-turno" style="background-color: green;">
            <span id="texto-turno">Esperando Configuración...</span>
            <span id="temporizador-ui" style="float: right;">⏱</span>
        </div>
        
        <img id="dado-img" src="" alt="Dado">
        
        <div id="controles-juego">
            <button id="btn-lanzar" class="btn btn-pildora" style="background-color: #27ae60; color: white;" onclick="intentarLanzarDado()" disabled>Lanzar Dado</button>
            <button id="btn-reiniciar" class="btn" style="background-color: #e74c3c; color: white;" onclick="reiniciarJuego()">Abandonar</button>
        </div>

        <div id="contenedor-tablas">
            <div class="seccion-tabla">
                <h3 style="margin-top: 0;">Ronda Actual</h3>
                <div id="lista-clasificacion"></div>
            </div>
            <div class="seccion-tabla">
                <h3 style="margin-top: 0; color: #f1c40f;">Ranking Torneo 🏆</h3>
                <div id="lista-torneo"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyANAn_VqAg_Sa0-ZQl9UOLh7mkew-uddE8",
            authDomain: "ludofamily-aed5a.firebaseapp.com",
            projectId: "ludofamily-aed5a",
            storageBucket: "ludofamily-aed5a.firebasestorage.app",
            messagingSenderId: "668858748639",
            appId: "1:668858748639:web:e7fefe14b21352ff5be36a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let partidaRef; let salaRef; let jugadoresRef;
        let modoJuego = ''; let esModoLocal = false; 
        
        let miColorIdx = null; let apodo = "";
        let coloresActivos = []; let nombresJugadores = {}; 
        let soyElHost = false;   
        
        const urlParams = new URLSearchParams(window.location.search);
        let idSala = urlParams.get('sala');
        if (!idSala) idSala = Math.floor(1000 + Math.random() * 9000).toString();

        const linkCompleto = window.location.origin + window.location.pathname + "?sala=" + idSala;
        document.getElementById('link-compartir').value = linkCompleto;

        function mostrarAlerta(mensaje) {
            const alerta = document.getElementById('alerta-flotante');
            alerta.innerText = mensaje; alerta.style.display = 'block';
            setTimeout(() => alerta.style.display = 'none', 3000);
        }

        // --- FLUJO DEL LOBBY MULTI-MODO ---
        function seleccionarModoJuego(modo) {
            modoJuego = modo; esModoLocal = (modo === 'local');
            document.getElementById('paso-0').style.display = 'none';
            document.getElementById('paso-1').style.display = 'block';
            if (esModoLocal) document.getElementById('controles-local').style.display = 'block';
            else { document.getElementById('controles-online').style.display = 'block'; salaRef = db.ref('salas/' + idSala); jugadoresRef = salaRef.child('jugadores'); }
        }

        function validarNick() {
            apodo = document.getElementById('input-nick').value.trim();
            if (apodo.length < 2) return alert("Por favor, escribe un apodo válido.");
            document.getElementById('paso-1').style.display = 'none';
            document.getElementById('paso-2').style.display = 'block';
            if (esModoLocal) document.getElementById('info-sala').innerText = "Partida Local";
            else { document.getElementById('info-sala').innerText = "Sala Online: " + idSala; escucharJugadoresLobbyOnline(); }
        }

        function escucharJugadoresLobbyOnline() {
            jugadoresRef.on('value', (snapshot) => {
                const jugadores = snapshot.val() || {};
                const coloresLocales = ['Verde', 'Amarillo', 'Azul', 'Rojo'];
                coloresLocales.forEach((colorTxt, idx) => {
                    const btn = document.getElementById(`btn-color-${idx}`);
                    const ocupado = Object.values(jugadores).find(j => j.colorIdx === idx);
                    if (ocupado) { btn.disabled = true; btn.innerText = `${colorTxt} (${ocupado.nick})`; }
                    else { btn.disabled = false; btn.innerText = colorTxt; }
                });
                const numJugadores = Object.keys(jugadores).length;
                if (numJugadores >= 2 && miColorIdx !== null) {
                    document.getElementById('msg-espera').innerText = `Jugadores listos: ${numJugadores}/4`;
                    document.getElementById('btn-iniciar-partida').style.display = 'inline-block';
                }
            });
            salaRef.child('estado').on('value', (snapshot) => {
                if (snapshot.val() === 'jugando') { document.getElementById('capa-lobby').style.display = 'none'; conectarMotorAFirebase(); }
            });
        }

        function elegirColor(idx) {
            miColorIdx = idx;
            if (!esModoLocal) { jugadoresRef.push({ nick: apodo, colorIdx: idx }); document.getElementById('botones-colores').style.display = 'none'; document.getElementById('msg-espera').innerText = "Esperando inicio..."; } 
            else { document.getElementById('botones-colores').style.display = 'none'; }
        }

        function iniciarPartidaOnline() {
            jugadoresRef.once('value').then(snapshot => {
                const jugadores = snapshot.val() || {};
                let activos = []; let nicksMap = {};
                Object.values(jugadores).forEach(j => { activos.push(j.colorIdx); nicksMap[j.colorIdx] = j.nick; });
                activos.sort((a,b) => a-b);
                db.ref('salas/' + idSala + '/partida/ultimoEvento').set({ id: Date.now() + "_start", tipo: 'START', activos: activos, nicksMap: nicksMap, turnoInicial: activos[0] }).then(() => { salaRef.update({ estado: 'jugando' }); });
            });
        }

        function iniciarPartidaLocal(numJugadores) {
            if (miColorIdx === null) return mostrarAlerta("¡Debes seleccionar tu color primero!");
            let activos = []; let nicksMap = {}; let nombresBots = ['Carlos', 'David', 'Luis']; let bIndex = 0;
            activos.push(miColorIdx); nicksMap[miColorIdx] = apodo;

            if (numJugadores === 2) { let opuesto = (miColorIdx + 2) % 4; activos.push(opuesto); nicksMap[opuesto] = nombresBots[0]; } 
            else { for (let i = 0; i < 4; i++) { if (i !== miColorIdx) { activos.push(i); nicksMap[i] = nombresBots[bIndex++]; } } }
            
            activos.sort((a,b) => a-b);
            document.getElementById('capa-lobby').style.display = 'none';
            distribuirEvento({ id: Date.now() + "_start", tipo: 'START', activos: activos, nicksMap: nicksMap, turnoInicial: activos[0] });
        }

        // ==========================================
        // SISTEMA WALKIE-TALKIE ADAPTATIVO
        // ==========================================
        let ultimoEventoId = null;

        function conectarMotorAFirebase() {
            partidaRef = db.ref('salas/' + idSala + '/partida');
            partidaRef.child('ultimoEvento').on('value', (snapshot) => {
                const ev = snapshot.val();
                if (!ev || ev.id === ultimoEventoId) return; 
                ultimoEventoId = ev.id;
                procesarEventoRemoto(ev);
            });
        }

        function distribuirEvento(datos) {
            datos.id = Date.now() + "_" + Math.random().toString(36).substr(2, 5);
            if (esModoLocal) setTimeout(() => procesarEventoRemoto(datos), 50);
            else { if (!partidaRef) return; partidaRef.child('ultimoEvento').set(datos); }
        }

        function procesarEventoRemoto(ev) {
            switch(ev.tipo) {
                case 'START':
                    coloresActivos = ev.activos; nombresJugadores = ev.nicksMap || {}; turno = ev.turnoInicial; soyElHost = true; 
                    codigosColor.forEach(c => puntosTorneo[c] = 0);
                    actualizarTablaTorneo();
                    codigosColor.forEach(c => { if (!coloresActivos.includes(codigosColor.indexOf(c))) { for(let i=0; i<4; i++) { let f = document.getElementById(`${c}-${i}`); if(f) f.style.display = 'none'; } } });
                    reiniciarTurnoVisual();
                    break;
                case 'DADO':
                    valorDado = ev.valor; document.getElementById('dado-img').src = `imagen/dado_${valorDado}.png`; document.getElementById('dado-img').style.display = 'inline-block'; document.getElementById('btn-lanzar').disabled = true;
                    evaluarOpcionesDespuesDelDado();
                    break;
                case 'REINTENTO_DADO':
                    valorDado = 0; document.getElementById('dado-img').style.display = 'none';
                    if (miColorIdx === turno) document.getElementById('btn-lanzar').disabled = false;
                    limiteTurnoMs = Date.now() + 30000; 
                    if (esModoLocal && turno !== miColorIdx) setTimeout(intentarLanzarDado, 2500); 
                    break;
                case 'MOVER': ejecutarMovimientoLocal(ev.color, ev.fichaIdx); break;
                case 'ACOPLE':
                    document.getElementById('modal-decision').style.display = 'none';
                    resolverAcoplamientoMatematico(ev.color, ev.nuevaPos, ev.decision);
                    break;
                case 'PASAR_TURNO':
                    turno = ev.siguienteTurno; intentosSalida = 0; valorDado = 0;
                    document.getElementById('dado-img').style.display = 'none'; document.getElementById('modal-decision').style.display = 'none'; decisionPendiente = null;
                    reiniciarTurnoVisual();
                    break;
                case 'REVANCHA':
                    ejecutarLimpiezaRevancha(ev.primerTurno);
                    break;
            }
        }

        // ==========================================
        // CEREBRO MAESTRO DE LA IA (NUEVO)
        // ==========================================
        function ejecutarCerebroBot(color) {
            let opciones = [];
            let fichasEnBase = 0; let fichasEnSalida = 0; let fichasEnRuta = 0; let fichasEnPasillo = [];
            
            // 1. Escaneo del Tablero
            for (let i = 0; i < 4; i++) {
                let pos = estadoFichas[color][i];
                if (pos === -1) fichasEnBase++;
                else if (pos === COORDENADA_SALIDA) fichasEnSalida++;
                else if (pos >= rutas[color].length - 6 && pos < rutas[color].length - 1) fichasEnPasillo.push(i);
                else if (pos < rutas[color].length - 1) fichasEnRuta++;
            }

            let hayGrupoEnSalida = grupos[`${color}-${COORDENADA_SALIDA}`] !== undefined;

            // 2. Generar Movimientos Legales
            for (let i = 0; i < 4; i++) {
                let pos = estadoFichas[color][i];
                if (pos >= rutas[color].length - 1) continue; 
                
                if (pos === -1) {
                    if (valorDado === 1 || valorDado === 6) {
                        let puedeSacar = true;
                        // Regla: Prohibido sacar 3ra si hay 2 sueltas en salida
                        if (fichasEnSalida === 2 && !hayGrupoEnSalida) puedeSacar = false;
                        // Regla: Prohibido apilar de a 3 (máximo muro de 2 permitidos en salida)
                        if (fichasEnSalida >= 2 && hayGrupoEnSalida) puedeSacar = false;

                        if (puedeSacar) {
                            opciones.push({ idx: i, accion: 'salir', posActual: -1, nuevaPos: COORDENADA_SALIDA });
                        }
                    }
                } else {
                    let np = pos + valorDado;
                    if (np >= rutas[color].length) np = (rutas[color].length - 1) - (np - (rutas[color].length - 1));
                    opciones.push({ idx: i, accion: 'mover', posActual: pos, nuevaPos: np, esPasillo: fichasEnPasillo.includes(i) });
                }
            }

            // 3. Filtrar y Priorizar Opciones
            if (opciones.length > 0) {
                let eleccion = null;
                
                // Aplicar Paciencia de Pasillo (No moliendo turnos a lo loco)
                let opcionesUtiles = opciones.filter(o => {
                    if (o.esPasillo && o.nuevaPos !== rutas[color].length - 1) {
                        // Si no llega a la meta, y hay fichas corriendo peligro, no mover esta
                        if (fichasEnRuta > 0 || fichasEnBase > 0) return false; 
                    }
                    return true;
                });
                if (opcionesUtiles.length === 0) opcionesUtiles = opciones; // Fallback

                // Prioridad 1: Llegar a la meta exacta
                let metas = opcionesUtiles.filter(o => o.nuevaPos === rutas[color].length - 1);
                if (metas.length > 0) eleccion = metas[0];

                // Prioridad 2: Cazar en el tablero general
                if (!eleccion) {
                    let cazadores = opcionesUtiles.filter(o => compruebaCapturaSimulada(color, o.nuevaPos));
                    if (cazadores.length > 0) eleccion = cazadores[0];
                }

                // Prioridad 3: Sacar de Base estratégicamente
                if (!eleccion) {
                    let salidas = opcionesUtiles.filter(o => o.accion === 'salir');
                    if (salidas.length > 0) eleccion = salidas[0];
                }

                // Prioridad 4: Mover la de más atrás o esparcir desde salida
                if (!eleccion) {
                    opcionesUtiles.sort((a,b) => a.posActual - b.posActual);
                    
                    let enSalida = opcionesUtiles.filter(o => o.posActual === COORDENADA_SALIDA);
                    if (enSalida.length > 0 && fichasEnSalida >= 2) {
                        eleccion = enSalida[0]; // Romper embotellamientos obligatoriamente
                    } else {
                        eleccion = opcionesUtiles[0]; // Mueve al rezagado
                    }
                }
                
                distribuirEvento({ tipo: 'MOVER', color: color, fichaIdx: eleccion.idx });
            }
        }

        function compruebaCapturaSimulada(color, posActual) {
            const posCoords = rutas[color][posActual]; const margen = 2.0;
            let esZonaSegura = codigosColor.some(c => { let est = rutas[c][COORDENADA_SALIDA]; return Math.abs(est[0] - posCoords[0]) < margen && Math.abs(est[1] - posCoords[1]) < margen; });
            if (esZonaSegura) return false;
            for (let c of codigosColor) {
                if (c === color) continue;
                for (let p of estadoFichas[c]) {
                    if (p === -1 || p >= rutas[c].length - 1) continue;
                    let pEnemigo = rutas[c][p];
                    if (Math.abs(pEnemigo[0] - posCoords[0]) < margen && Math.abs(pEnemigo[1] - posCoords[1]) < margen) return true; 
                }
            } return false;
        }

        // ==========================================
        // VARIABLES Y RUTAS LOCALES 
        // ==========================================
        let turno = 0; let valorDado = 0; let intentosSalida = 0;
        let fichasEnMeta = { 'green': 0, 'yellow': 0, 'blue': 0, 'red': 0 };
        let clasificacion = []; let grupos = {}; 
        let puntosTorneo = { 'green': 0, 'yellow': 0, 'blue': 0, 'red': 0 }; 

        const colores = ['Verde', 'Amarillo', 'Azul', 'Rojo'];
        const codigosColor = ['green', 'yellow', 'blue', 'red'];
        const COORDENADA_SALIDA = 4;
        let limiteTurnoMs = 0; let intervaloTemporizador; let decisionPendiente = null;

        const rutas = {
            'red': [[72.0, 28.5], [71.9, 12.2], [87.3, 14.1], [87.8, 29.0], [89.8, 44.1], [83.1, 43.9], [75.8, 44.0], [69.1, 44.1], [63.2, 44.6], [56.3, 37.6], [55.9, 30.6], [56.0, 23.9], [56.1, 17.3], [56.1, 11.0], [56.4, 4.4], [49.9, 4.2], [43.5, 3.7], [43.6, 10.4], [43.3, 18.4], [43.2, 24.4], [43.3, 30.6], [43.6, 38.1], [36.8, 44.3], [29.7, 43.9], [23.1, 44.0], [16.9, 44.1], [10.0, 44.1], [3.5, 44.2], [3.8, 50.8], [3.6, 57.5], [9.7, 57.1], [16.9, 57.9], [24.1, 58.0], [30.0, 57.5], [37.0, 56.8], [43.6, 63.9], [43.6, 70.6], [43.7, 77.0], [43.4, 84.4], [43.7, 90.9], [43.4, 97.1], [49.7, 96.6], [56.5, 96.5], [56.8, 90.6], [56.5, 83.4], [57.5, 76.8], [56.9, 70.2], [56.9, 63.8], [63.8, 56.7], [69.8, 57.0], [76.4, 57.3], [82.4, 57.5], [89.1, 57.1], [96.0, 57.9], [96.2, 50.7], [89.0, 50.7], [83.2, 50.3], [76.4, 50.6], [68.9, 51.0], [62.9, 51.2], [55.9, 51.0]],
            'blue': [[72.4, 73.1], [86.9, 73.5], [86.8, 88.4], [72.5, 87.4], [56.5, 91.4], [56.1, 83.9], [56.1, 77.1], [56.5, 70.5], [56.0, 64.2], [62.4, 58.0], [69.9, 56.7], [76.1, 57.1], [82.7, 57.1], [90.3, 56.7], [95.8, 57.3], [96.6, 50.9], [96.3, 43.5], [90.4, 43.9], [83.0, 43.9], [76.2, 43.5], [70.0, 44.3], [63.0, 43.8], [56.4, 37.2], [56.8, 30.3], [56.3, 24.8], [56.8, 17.7], [56.5, 11.2], [56.9, 4.4], [49.7, 3.9], [42.6, 3.7], [43.3, 10.8], [43.6, 18.0], [43.9, 24.4], [43.5, 30.5], [44.0, 37.5], [36.8, 44.1], [30.0, 44.2], [23.3, 43.7], [16.9, 43.9], [10.3, 43.7], [4.2, 43.9], [3.3, 50.6], [3.7, 57.5], [11.0, 57.1], [16.6, 57.5], [23.4, 57.1], [29.9, 57.1], [36.8, 56.9], [43.3, 63.9], [43.7, 70.3], [43.7, 77.2], [43.5, 83.7], [43.9, 90.2], [43.5, 97.3], [50.0, 97.2], [50.2, 90.2], [50.5, 83.4], [50.4, 76.5], [50.4, 69.7], [49.6, 64.4], [50.4, 56.6]],
            'green': [[13.1, 27.9], [13.0, 13.7], [27.6, 13.8], [28.2, 28.6], [43.5, 11.5], [43.4, 17.6], [43.4, 23.9], [43.5, 31.2], [43.4, 37.4], [36.9, 43.4], [30.1, 44.3], [23.4, 44.4], [17.0, 44.3], [10.1, 44.0], [3.8, 44.1], [4.2, 50.7], [3.5, 57.1], [10.0, 57.6], [16.9, 57.9], [24.1, 57.5], [30.5, 57.3], [36.3, 57.4], [43.3, 64.5], [43.7, 70.5], [43.9, 77.7], [43.4, 84.2], [43.1, 90.7], [43.3, 97.1], [49.7, 97.2], [56.7, 96.9], [57.0, 90.1], [56.5, 83.8], [56.4, 76.2], [56.5, 70.7], [56.8, 63.4], [62.9, 56.9], [69.5, 57.4], [76.3, 57.3], [83.6, 57.3], [89.4, 57.3], [96.2, 57.5], [96.3, 51.4], [96.8, 44.1], [89.8, 43.8], [82.7, 43.8], [76.2, 43.7], [69.2, 44.6], [62.4, 44.2], [56.8, 36.6], [56.5, 30.5], [56.3, 24.1], [56.5, 17.3], [56.5, 10.8], [56.5, 4.2], [50.1, 3.9], [49.6, 11.3], [50.1, 18.6], [49.6, 24.8], [49.7, 31.4], [49.6, 37.9], [49.6, 45.4]],
            'yellow': [[28.0, 73.6], [28.0, 88.0], [13.9, 87.5], [13.6, 73.1], [9.8, 57.8], [16.5, 57.4], [24.1, 57.0], [29.6, 57.3], [36.5, 56.9], [43.1, 63.4], [43.7, 70.1], [43.3, 76.9], [42.9, 84.4], [43.5, 90.5], [43.4, 96.9], [49.7, 96.5], [56.4, 96.8], [56.9, 90.2], [56.8, 83.7], [56.8, 77.1], [56.5, 70.5], [56.4, 63.4], [62.8, 57.1], [69.2, 57.0], [75.9, 57.5], [83.2, 57.3], [90.0, 57.5], [96.7, 57.7], [96.5, 51.4], [96.2, 44.2], [89.3, 44.4], [83.3, 44.1], [75.6, 44.0], [69.7, 44.2], [62.7, 43.0], [56.4, 36.6], [56.2, 30.3], [56.0, 24.0], [56.2, 17.0], [56.0, 11.1], [56.3, 4.5], [49.6, 3.7], [43.5, 4.2], [42.9, 9.9], [43.2, 17.3], [43.2, 24.8], [43.4, 31.0], [43.3, 38.2], [36.9, 44.2], [30.0, 44.1], [23.6, 43.9], [17.4, 44.1], [9.6, 44.0], [3.8, 43.2], [2.9, 50.7], [10.0, 50.9], [16.6, 51.4], [23.0, 51.2], [30.0, 50.7], [36.7, 50.7], [43.9, 50.7]]
        };
        let estadoFichas = {}; codigosColor.forEach(c => estadoFichas[c] = [-1, -1, -1, -1]);

        // ==========================================
        // LÓGICA DE TURNOS 
        // ==========================================
        function reiniciarTurnoVisual() {
            let objetivoMeta = coloresActivos.length > 1 ? coloresActivos.length - 1 : 1;
            if (clasificacion.length >= objetivoMeta) return; 
            
            let nickActual = nombresJugadores[turno] || colores[turno];
            let colorTexto = (turno === 1) ? '#2c3e50' : 'white';
            
            document.getElementById('indicador-turno').innerHTML = `<span style="color:${colorTexto}">Turno: ${nickActual}</span><span id="temporizador-ui" style="float: right; color:${colorTexto}">⏱</span>`;
            document.getElementById('indicador-turno').style.backgroundColor = codigosColor[turno];
            
            document.getElementById('btn-lanzar').disabled = (miColorIdx !== turno);
            actualizarEventosClic();
            
            limiteTurnoMs = Date.now() + 30000;
            iniciarTemporizador(colorTexto);

            if (esModoLocal && turno !== miColorIdx) { setTimeout(intentarLanzarDado, 2500); }
        }

        function iniciarTemporizador(colorOriginal) {
            clearInterval(intervaloTemporizador);
            intervaloTemporizador = setInterval(() => {
                let tiempoRestante = Math.ceil((limiteTurnoMs - Date.now()) / 1000);
                if (tiempoRestante < 0) tiempoRestante = 0;
                
                const tempUI = document.getElementById('temporizador-ui');
                if (tempUI) { tempUI.innerText = `⏱ ${tiempoRestante}s`; tempUI.style.color = tiempoRestante <= 5 ? '#e74c3c' : colorOriginal; }
                
                if (tiempoRestante <= 0) {
                    clearInterval(intervaloTemporizador);
                    if (miColorIdx === turno || soyElHost) calcularSiguienteTurnoYEnviar();
                }
            }, 1000);
        }

        function detenerTemporizador() { clearInterval(intervaloTemporizador); }

        function calcularSiguienteTurnoYEnviar() {
            let objetivoMeta = coloresActivos.length > 1 ? coloresActivos.length - 1 : 1;
            if (clasificacion.length >= objetivoMeta) return;

            let proxTurno = turno; let turnosBuscados = 0;
            do { proxTurno = (proxTurno + 1) % 4; turnosBuscados++; } 
            while ((!coloresActivos.includes(proxTurno) || clasificacion.includes(codigosColor[proxTurno])) && turnosBuscados < 4);
            
            distribuirEvento({ tipo: 'PASAR_TURNO', siguienteTurno: proxTurno });
        }

        function intentarLanzarDado() {
            if (turno !== miColorIdx && !(esModoLocal && turno !== miColorIdx)) return;
            let valor = Math.floor(Math.random() * 6) + 1;
            distribuirEvento({ tipo: 'DADO', valor: valor }); 
        }

        function evaluarOpcionesDespuesDelDado() {
            let actual = codigosColor[turno];
            let todasEnBase = estadoFichas[actual].every(pos => pos === -1);
            
            if (todasEnBase && valorDado !== 6 && valorDado !== 1) {
                if (miColorIdx === turno || (esModoLocal && soyElHost && turno !== miColorIdx)) {
                    intentosSalida++;
                    if (intentosSalida >= 3) { setTimeout(() => calcularSiguienteTurnoYEnviar(), 1000); }
                    else { setTimeout(() => distribuirEvento({ tipo: 'REINTENTO_DADO' }), 1000); }
                }
            } else {
                actualizarEventosClic();
                if (esModoLocal && turno !== miColorIdx) { setTimeout(() => ejecutarCerebroBot(actual), 2500); }
            }
        }

        function intentarMovimientoFicha(color, i) {
            if (miColorIdx === null || turno !== miColorIdx || valorDado === 0 || color !== codigosColor[turno]) return;
            let posActual = estadoFichas[color][i];
            if (posActual === -1 && valorDado !== 6 && valorDado !== 1) return; 
            distribuirEvento({ tipo: 'MOVER', color: color, fichaIdx: i });
        }

        // ==========================================
        // MATEMÁTICA PURA Y CIERRE DE PARTIDA
        // ==========================================
        function ejecutarMovimientoLocal(color, i) {
            let grupoKey = Object.keys(grupos).find(key => grupos[key].includes(`${color}-${i}`));
            let fichasAMover = grupoKey ? grupos[grupoKey] : [`${color}-${i}`];
            let posActual = estadoFichas[color][i];
            
            let nuevaPos = posActual === -1 ? COORDENADA_SALIDA : posActual + valorDado;
            if (nuevaPos >= rutas[color].length) { nuevaPos = (rutas[color].length - 1) - (nuevaPos - (rutas[color].length - 1)); }

            if (nuevaPos === rutas[color].length - 1) {
                fichasEnMeta[color] += fichasAMover.length;
                fichasAMover.forEach(id => document.getElementById(id).style.display = 'none');
                actualizarMetaUI(color);
                
                Object.keys(grupos).forEach(key => { grupos[key] = grupos[key].filter(id => !fichasAMover.includes(id)); if (grupos[key].length <= 1) delete grupos[key]; });
                
                if (fichasEnMeta[color] >= 4 && !clasificacion.includes(color)) {
                    clasificacion.push(color);
                    actualizarClasificacionRonda();
                }
                
                actualizarDistintivos(); 
                let objetivoMeta = coloresActivos.length > 1 ? coloresActivos.length - 1 : 1;
                
                if (clasificacion.length >= objetivoMeta) {
                    let ultimo = codigosColor.find((c, idx) => coloresActivos.includes(idx) && !clasificacion.includes(c));
                    if(ultimo && !clasificacion.includes(ultimo)) { clasificacion.push(ultimo); actualizarClasificacionRonda(); }
                    mostrarPantallaFinal();
                } else { finalizarMovimientoPasoTurno(color); }

            } else {
                fichasAMover.forEach(id => { 
                    let [c, idx] = id.split('-'); 
                    estadoFichas[c][idx] = nuevaPos;
                    const fichaDOM = document.getElementById(id);
                    fichaDOM.style.top = rutas[c][nuevaPos][0] + "%";
                    fichaDOM.style.left = rutas[c][nuevaPos][1] + "%";
                });
                
                Object.keys(grupos).forEach(key => { grupos[key] = grupos[key].filter(id => !fichasAMover.includes(id)); if (grupos[key].length <= 1) delete grupos[key]; });
                
                let todasEnDestino = [];
                estadoFichas[color].forEach((p, idx) => { if (p === nuevaPos && document.getElementById(`${color}-${idx}`).style.display !== 'none') todasEnDestino.push(`${color}-${idx}`); });

                actualizarDistintivos();

                if (todasEnDestino.length > 1 && nuevaPos === COORDENADA_SALIDA) {
                    if (miColorIdx === turno) { 
                        decisionPendiente = { color, nuevaPos, todasEnDestino };
                        document.getElementById('modal-decision').style.display = 'block';
                    } else if (esModoLocal && turno !== miColorIdx) { 
                        // LÓGICA DE ACOPLE INTELIGENTE DEL BOT
                        let decisionAcople = true; 
                        let enBase = estadoFichas[color].filter(p => p === -1).length;
                        let hayGrupoPreviamente = grupos[`${color}-${COORDENADA_SALIDA}`] !== undefined;

                        if (todasEnDestino.length === 2 && enBase === 2) decisionAcople = false; // 2da Ficha: NO se monta
                        else if (todasEnDestino.length === 2 && enBase === 1) decisionAcople = true; // 3ra Ficha: SI arma muro
                        else if (todasEnDestino.length === 3 && enBase === 0 && hayGrupoPreviamente) decisionAcople = false; // 4ta Ficha: NO se monta al muro

                        distribuirEvento({ tipo: 'ACOPLE', color: color, nuevaPos: nuevaPos, decision: decisionAcople });
                    }
                } else {
                    if (todasEnDestino.length > 1) grupos[`${color}-${nuevaPos}`] = todasEnDestino;
                    verificarCaptura(color, nuevaPos);
                    actualizarDistintivos();
                    finalizarMovimientoPasoTurno(color);
                }
            }
        }

        // ==========================================
        // TABLAS Y TORNEO 
        // ==========================================
        function mostrarPantallaFinal() {
            detenerTemporizador();
            document.getElementById('indicador-turno').innerHTML = `<span style="color:#f1c40f;">¡PARTIDA FINALIZADA!</span>`;
            document.getElementById('indicador-turno').style.backgroundColor = '#2c3e50';
            document.getElementById('btn-lanzar').disabled = true;

            calcularPuntosTorneo();

            let ganadorColor = clasificacion[0];
            let idxGanador = codigosColor.indexOf(ganadorColor);
            let nickGanador = nombresJugadores[idxGanador] || ganadorColor;

            document.getElementById('texto-ganador').innerHTML = `El ganador absoluto es:<br><br> <span style="color:${ganadorColor}; font-size: 36px; text-transform:uppercase; font-weight:bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">${nickGanador}</span>`;
            document.getElementById('modal-ganador').style.display = 'block';
        }

        function calcularPuntosTorneo() {
            const premios = [25, 15, 10, 5];
            clasificacion.forEach((colorGanador, posicion) => {
                if(premios[posicion]) { puntosTorneo[colorGanador] += premios[posicion]; }
            });
            actualizarTablaTorneo();
        }

        function actualizarClasificacionRonda() {
            const lista = document.getElementById('lista-clasificacion'); lista.innerHTML = "";
            clasificacion.forEach((color, index) => {
                const item = document.createElement('div'); item.className = 'puesto-item'; item.style.borderLeftColor = color;
                let idxColor = codigosColor.indexOf(color); let nickAMostrar = nombresJugadores[idxColor] || color;
                item.innerHTML = `<span>#${index + 1} Lugar</span> <span style="color:${color}; font-weight:bold;">${nickAMostrar.toUpperCase()}</span>`;
                lista.appendChild(item);
            });
        }

        function actualizarTablaTorneo() {
            const lista = document.getElementById('lista-torneo'); lista.innerHTML = "";
            let ranking = coloresActivos.map(idx => codigosColor[idx]);
            ranking.sort((a, b) => puntosTorneo[b] - puntosTorneo[a]);

            ranking.forEach((color, index) => {
                const item = document.createElement('div'); item.className = 'puesto-item'; item.style.borderLeftColor = color;
                let idxColor = codigosColor.indexOf(color); let nickAMostrar = nombresJugadores[idxColor] || color;
                item.innerHTML = `<span>${nickAMostrar.toUpperCase()}</span> <span style="color:#f1c40f; font-weight:bold;">${puntosTorneo[color]} pts</span>`;
                lista.appendChild(item);
            });
        }

        // ==========================================
        // LA REVANCHA 
        // ==========================================
        function solicitarRevancha() {
            let ganadorPrevio = codigosColor.indexOf(clasificacion[0]);
            distribuirEvento({ tipo: 'REVANCHA', primerTurno: ganadorPrevio });
        }

        function ejecutarLimpiezaRevancha(primerTurno) {
            codigosColor.forEach(c => estadoFichas[c] = [-1, -1, -1, -1]);
            fichasEnMeta = { 'green': 0, 'yellow': 0, 'blue': 0, 'red': 0 };
            clasificacion = []; grupos = {}; intentosSalida = 0; valorDado = 0;
            
            document.getElementById('dado-img').style.display = 'none';
            document.getElementById('modal-ganador').style.display = 'none';
            actualizarClasificacionRonda(); 
            actualizarDistintivos(); 
            
            codigosColor.forEach(c => {
                actualizarMetaUI(c);
                for(let i=0; i<4; i++) {
                    let f = document.getElementById(`${c}-${i}`);
                    if(f && coloresActivos.includes(codigosColor.indexOf(c))) {
                        f.style.top = f.dataset.baseX + "%";
                        f.style.left = f.dataset.baseY + "%";
                        f.style.display = 'flex';
                    }
                }
            });

            turno = primerTurno !== undefined ? primerTurno : coloresActivos[0];
            reiniciarTurnoVisual();
        }

        // ==========================================
        // OTRAS FUNCIONES DE UTILIDAD
        // ==========================================
        function cerrarModalGanador() { document.getElementById('modal-ganador').style.display = 'none'; }
        function responderModalAcople(quiereAcoplar) { if (!decisionPendiente) return; distribuirEvento({ tipo: 'ACOPLE', color: decisionPendiente.color, nuevaPos: decisionPendiente.nuevaPos, decision: quiereAcoplar }); }
        
        function resolverAcoplamientoMatematico(color, nuevaPos, quiereAcoplar) {
            let todasEnDestino = []; estadoFichas[color].forEach((p, idx) => { if (p === nuevaPos && document.getElementById(`${color}-${idx}`).style.display !== 'none') todasEnDestino.push(`${color}-${idx}`); });
            if (quiereAcoplar) grupos[`${color}-${nuevaPos}`] = todasEnDestino;
            verificarCaptura(color, nuevaPos); 
            actualizarDistintivos(); 
            finalizarMovimientoPasoTurno(color);
        }

        function finalizarMovimientoPasoTurno(color) {
            if (miColorIdx !== turno && !(esModoLocal && soyElHost)) return; 
            if (fichasEnMeta[color] >= 4 || (valorDado !== 1 && valorDado !== 6)) { setTimeout(() => calcularSiguienteTurnoYEnviar(), 500); } 
            else { setTimeout(() => distribuirEvento({ tipo: 'REINTENTO_DADO' }), 500); }
        }

        function verificarCaptura(colorJugador, posActual) {
            const posCoords = rutas[colorJugador][posActual]; const margen = 2.0; 
            let esZonaSegura = codigosColor.some(c => { let estrella = rutas[c][COORDENADA_SALIDA]; return Math.abs(estrella[0] - posCoords[0]) < margen && Math.abs(estrella[1] - posCoords[1]) < margen; });
            if (esZonaSegura) return;
            codigosColor.forEach(c => {
                if (c === colorJugador) return;
                estadoFichas[c].forEach((p, idx) => {
                    if (p === -1 || p >= rutas[c].length - 1) return;
                    let pEnemigo = rutas[c][p];
                    if (Math.abs(pEnemigo[0] - posCoords[0]) < margen && Math.abs(pEnemigo[1] - posCoords[1]) < margen) {
                        estadoFichas[c][idx] = -1; const fichaDefensora = document.getElementById(`${c}-${idx}`);
                        fichaDefensora.style.top = fichaDefensora.dataset.baseX + "%"; fichaDefensora.style.left = fichaDefensora.dataset.baseY + "%";
                        Object.keys(grupos).forEach(key => { if(grupos[key].includes(`${c}-${idx}`)) delete grupos[key]; });
                    }
                });
            });
        }

        function actualizarEventosClic() {
            codigosColor.forEach(c => {
                for (let i = 0; i < 4; i++) {
                    const ficha = document.getElementById(`${c}-${i}`);
                    if (ficha) { ficha.style.pointerEvents = (c === codigosColor[turno] && !clasificacion.includes(c) && valorDado > 0) ? 'auto' : 'none'; }
                }
            });
        }

        function actualizarDistintivos() {
            document.querySelectorAll('.badge-grupo').forEach(b => b.remove());
            Object.keys(grupos).forEach(key => {
                if (grupos[key].length > 1) {
                    grupos[key].forEach(idFicha => {
                        const ficha = document.getElementById(idFicha);
                        if (ficha) {
                            const badge = document.createElement('div');
                            badge.className = 'badge-grupo'; badge.innerText = grupos[key].length;
                            ficha.appendChild(badge);
                        }
                    });
                }
            });
        }

        function actualizarMetaUI(color) { const el = document.getElementById(`ui-${color}`); el.innerText = fichasEnMeta[color] > 0 ? fichasEnMeta[color] : ""; }
        
        function actualizarClasificacion() {
            const lista = document.getElementById('lista-clasificacion'); lista.innerHTML = "";
            clasificacion.forEach((color, index) => {
                const item = document.createElement('div'); item.className = 'puesto-item'; item.style.borderLeftColor = color;
                let idxColor = codigosColor.indexOf(color);
                let nickAMostrar = nombresJugadores[idxColor] || color;
                item.innerHTML = `<span>#${index + 1} Lugar</span> <span style="color:${color}; font-weight:bold;">${nickAMostrar.toUpperCase()}</span>`;
                lista.appendChild(item);
            });
        }

        function crearFichasBase(lista, color) {
            const contenedor = document.getElementById('contenedor-tablero');
            lista.slice(0, 4).forEach((coord, i) => {
                const ficha = document.createElement('div');
                ficha.className = 'ficha'; ficha.style.backgroundColor = color;
                ficha.style.top = coord[0] + "%"; ficha.style.left = coord[1] + "%";
                ficha.dataset.baseX = coord[0]; ficha.dataset.baseY = coord[1];
                ficha.id = `${color}-${i}`; 
                ficha.onclick = () => intentarMovimientoFicha(color, i);
                contenedor.appendChild(ficha);
            });
        }

        function reiniciarJuego() { 
            if (confirm("¿Abandonar partida perdiendo el progreso?")) { 
                if(!esModoLocal) salaRef.remove().then(() => { location.search = ""; });
                else location.search = "";
            } 
        }

        codigosColor.forEach(c => crearFichasBase(rutas[c], c));
    </script>
