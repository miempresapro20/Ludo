<!DOCTYPE html>
<html>
<head>
    <style>
        #tablero { 
            position: relative; 
            width: 500px; 
            height: 500px; 
            background-image: url('tablero_limpio.png'); 
            background-size: contain; 
        }
        .ficha { 
            position: absolute; 
            width: 40px; 
            transition: all 0.5s; 
        }
    </style>
</head>
<body>
    <div id="tablero">
        <img src="ficha_roja.png" class="ficha" id="fichaRoja" style="top: 50px; left: 50px;">
    </div>
    
    <img id="dado" src="dado_1.png" style="width: 50px;">
    <button onclick="lanzarDado()">Lanzar Dado</button>

    <script>
        function lanzarDado() {
            let resultado = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dado').src = `dado_${resultado}.png`;
            // Aquí moveremos la ficha después
        }
    </script>
</body>
</html>
